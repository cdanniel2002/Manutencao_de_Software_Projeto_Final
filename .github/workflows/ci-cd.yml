name: CI/CD

# CI em todo push/PR para a main; CD (publicar imagem) apenas em push na main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancela execuções antigas do mesmo branch quando chega um push novo.
concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  # ----------------------------------------------------------------------
  # CI 1: testes do backend (Django) usando SQLite + settings de dev
  # ----------------------------------------------------------------------
  backend-tests:
    name: Backend - testes (Django)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Variáveis exigidas pelo settings/base.py (lidas via python-decouple).
      # Valores fictícios: os testes rodam em SQLite e com e-mail no console.
      DJANGO_SETTINGS_MODULE: config.settings.development
      USE_POSTGRESQL: "False"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
      BACKEND_URL: "http://localhost:8000"
      EMAIL_HOST: "smtp.example.com"
      EMAIL_HOST_USER: "Your Email"
      EMAIL_HOST_PASSWORD: "changeme"
      DJOSER_EMAIL_FRONTEND_PROTOCOL: "http"
      DJOSER_EMAIL_FRONTEND_DOMAIN: "localhost:3000"
      DJOSER_EMAIL_FRONTEND_SITE_NAME: "FinanSee"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/*.txt

      # weasyprint (importado em periods/api/views.py) precisa destas libs nativas.
      - name: Instalar dependências de sistema (weasyprint)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b \
            libgdk-pixbuf-2.0-0 libcairo2

      - name: Instalar dependências Python
        run: pip install -r requirements/development.txt

      - name: Rodar migrações (sanity check)
        working-directory: backend/core
        run: python manage.py migrate --noinput

      - name: Rodar testes
        working-directory: backend/core
        run: pytest -q

  # ----------------------------------------------------------------------
  # CI 2: lint do frontend (Next.js)
  # ----------------------------------------------------------------------
  frontend-lint:
    name: Frontend - lint (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Front/sage
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Front/sage/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

  # ----------------------------------------------------------------------
  # CD: builda e publica a imagem Docker do backend no GHCR.
  # Só roda em push na main e somente se a CI passou.
  # ----------------------------------------------------------------------
  build-and-push:
    name: CD - publicar imagem no GHCR
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/finansee-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadados da imagem (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
