services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${DB_NAME:-mydatabase}
      POSTGRES_USER: ${DB_USER:-myuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mypassword}
    ports:
      - "5432:5432"

  web:
    # Imagem publicada pelo CI/CD no GHCR (.github/workflows/ci-cd.yml).
    # No servidor: `docker compose pull && docker compose up -d`.
    image: ghcr.io/${IMAGE_OWNER:-cdanniel2002}/finansee-backend:${IMAGE_TAG:-latest}
    # Para buildar localmente em vez de puxar do GHCR, descomente o build
    # abaixo e rode `docker compose up -d --build`:
    # build: .
    restart: unless-stopped
    command: gunicorn --bind 0.0.0.0:8000 --workers 3 config.wsgi
    volumes:
      - static_volume:/app/core/staticfiles
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db

  apache:
    image: httpd:2.4
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - SERVER_NAME=${SERVER_NAME:-localhost}
    volumes:
      - static_volume:/usr/local/apache2/htdocs/static
      - ./apache/httpd.conf:/usr/local/apache2/conf/httpd.conf
      - ./apache/ssl:/usr/local/apache2/conf/ssl
      - ./apache/start-apache.sh:/usr/local/bin/start-apache.sh
    command: ["/usr/local/bin/start-apache.sh"]
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
